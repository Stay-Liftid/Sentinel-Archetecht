<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Remote Viewer - Edge Provisioning</title>
    <style>
        body { background: #121212; color: #e0e0e0; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { border: 1px solid #333; padding: 2rem; border-radius: 8px; background: #1e1e1e; text-align: center; }
        esp-web-install-button { margin-top: 1.5rem; }
    </style>
</head>
<body>
    <div class="container">
        <h2>The Remote Viewer</h2>
        <p>Connect your ESP32 edge node via USB to flash firmware directly.</p>
        
        <!-- ESP Web Tools Installer Integration -->
        <script type="module" src="https://unpkg.com/esp-web-tools@10/dist/web/install-button.js?module"></script>
        
        <esp-web-install-button manifest="firmware/manifest.json">
            <button slot="activate">Flash Edge Node</button>
        </esp-web-install-button>
    </div>
</body>
</html>

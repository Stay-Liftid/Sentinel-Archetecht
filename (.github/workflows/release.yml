name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-nodes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Toolchain
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Compile Desktop Binaries
        run: |
          echo "Compiling native binaries..."
          mkdir -p build/desktop
          # Insert cross-compilation commands (e.g., cargo build --release or cmake)

      - name: Compile ESP32 Firmware
        run: |
          echo "Building ESP32 firmware via ESP-IDF container..."
          mkdir -p build/esp32

      - name: Package Artifacts
        run: |
          tar -czvf remote-viewer-artifacts.tar.gz build/

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: remote-viewer-artifacts.tar.gz

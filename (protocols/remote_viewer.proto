syntax = "proto3";

package remoteviewer;

message TelemetryPacket {
  string node_id = 1;
  uint64 hlc_timestamp = 2; // Hybrid Logical Clock timestamp
  uint32 lamport_counter = 3;
  
  enum SpectrumType {
    CELLULAR = 0;
    WIFI = 1;
    BLE = 2;
    RF_ISM = 3;
    UWB = 4;
  }
  
  SpectrumType spectrum = 4;
  bytes payload_metrics = 5; // Compressed density or IQ summary
  bytes cryptographic_signature = 6; // Ed25519 signature via libsodium
}
